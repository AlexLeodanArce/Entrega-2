<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/main.css">
    <title>Contacto | Armas Medievales</title>
</head>
<body>
    <header>
        <h1>
            <a href="../index.html">Armas Medievales</a>
        </h1>
        <nav>
            <ul>
                <li><a href="espadas.html">Espadas</a></li>
                <li><a href="armas-de-asta.html">Armas de Asta</a></li>
                <li><a href="armas-contundentes.html">Armas Contundentes</a></li>
                <li><a href="armas-a-distancia.html">Armas a Distancia</a></li>
                <li><a href="dagas-y-armas-cortas.html">Dagas y Armas Cortas</a></li>
                <li><a href="armas-especializadas.html">Armas Especializadas</a></li>
                <li><a href="armaduras-y-defensa.html">Armaduras y Defensa</a></li>
                <li><a href="armas-legendarias.html">Armas Legendarias</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <form action="/submit" method="POST">
            <label for="nombre-completo">Nombre completo:</label>
            <input type="text" name="nombre-completo" id="nombre-completo">

            <label for="correo">Correo electrónico:</label>
            <input type="email" name="correo" id="correo">
            <fieldset>
                <legend>Motivo de contacto:</legend>

                <input type="radio" name="motivo" id="consulta" value="consulta">
                <label for="consulta">Consulta</label>

                <input type="radio" name="motivo" id="sugerencia" value="sugerencia">
                <label for="sugerencia">Sugerencia</label>

                <input type="radio" name="motivo" id="reclamo" value="reclamo">
                <label for="reclamo">Reclamo</label>
            </fieldset>

            <label for="mensaje">Mensaje:</label>
            <textarea name="mensaje" id="mensaje"></textarea>

            <button type="submit">Enviar</button>

        </form>
    </main>
    <footer>
        <p>
            <a href="contacto.html">Contacto</a>
            <a href="#">YouTube</a>
            <a href="#">Twitter</a>
            <a href="#">Instagram</a>
            <a href="#">Facebook</a>
        </p>
    </footer>
</body>
</html>
